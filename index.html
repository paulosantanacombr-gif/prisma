<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Seedream 4.5 — Bytedance Agent</title>
<style>
  :root { --bg: #0a0a0b; --surface: #111114; --accent: #3b9eff; --text: #d4d8e8; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
  .app { max-width: 600px; margin: 0 auto; background: var(--surface); padding: 20px; border-radius: 10px; }
  input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; }
  .btn { background: var(--accent); color: white; border: none; cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <h1>SEEDREAM 4.5</h1>
  <p>Conexão Oficial: Bytedance API</p>
  
  <input type="text" id="apiToken" placeholder="Insira seu Token de Acesso da Bytedance">
  <input type="text" id="apiEndpoint" placeholder="Endpoint oficial (ex: https://api.bytedance.com/v1/...)">
  
  <input type="file" id="fileInput" multiple accept="image/*">
  <button class="btn" onclick="processar()">Processar com Seedream 4.5</button>
  
  <div id="status"></div>
</div>

<script>
async function processar() {
  const token = document.getElementById('apiToken').value;
  const endpoint = document.getElementById('apiEndpoint').value;
  const files = document.getElementById('fileInput').files;
  const status = document.getElementById('status');

  for (let file of files) {
    status.innerHTML += `<p>Enviando ${file.name} para Bytedance...</p>`;
    
    // Preparando o arquivo para envio via FormData (Padrão da maioria das APIs da Bytedance)
    const formData = new FormData();
    formData.append('image', file);
    formData.append('model', 'seedream-4.5');

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`, // Ajuste conforme a doc. da sua conta
          'Accept': 'application/json'
        },
        body: formData
      });

      if (response.ok) {
        status.innerHTML += `<p style="color:green">✓ ${file.name} concluído!</p>`;
      } else {
        status.innerHTML += `<p style="color:red">✗ Erro no envio de ${file.name}</p>`;
      }
    } catch (e) {
      status.innerHTML += `<p style="color:red">Falha de rede: ${e.message}</p>`;
    }
  }
}
</script>
</body>
</html>
